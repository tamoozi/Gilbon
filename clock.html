<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            text-align: center;\n            margin-top: 50px;\n            background-color: #f0f0f0;\n        }\n        .clock {\n            font-size: 48px;\n            margin-bottom: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock" id="clock"></div>\n    <script>\n        function updateClock() {\n            const options = {\n                timeZone: 'Asia/Jerusalem',\n                hour: '2-digit',\n                minute: '2-digit',\n                second: '2-digit',\n                hour12: false\n            };\n            const jerusalemTime = new Intl.DateTimeFormat('en-US', options).format(new Date());\n            document.getElementById('clock').innerText = `Israel Time: ${jerusalemTime}`;\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>
