<style>
    .projects-grid li::before {
        content: none; /* This removes the checkmark symbols */
    }
</style>

<script>
    // Code to fix image paths
    const images = document.querySelectorAll('.project-image');
    images.forEach(img => {
        const originalPath = img.getAttribute('src');
        img.setAttribute('src', originalPath.replace('/projects/', '/'));
    });
</script>

<!-- Assuming the green checkmarks are part of the HTML content, you need to remove them accordingly -->

<div class="projects-grid">
    <ul>
        <li>Project 1</li>

        <li>Project 3</li>
    </ul>
</div>
